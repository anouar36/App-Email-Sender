services:
  # Backend API Service
  - type: web
    name: email-sender-backend
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: sqlite:./email_sender.db      - key: npm_config_build_from_source
        value: true
      - key: FRONTEND_URL
        value: https://app-email-sender-1.onrender.com
    healthCheckPath: /api/health

  # Frontend Static Site  
  - type: static
    name: email-sender-frontend
    env: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production      - key: VITE_API_URL
        value: https://app-email-sender-backend.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
