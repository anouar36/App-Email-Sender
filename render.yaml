services:
  # Backend API Service
  - type: web
    name: email-sender-backend
    env: node
    plan: free
    region: oregon  # or your preferred region
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: sqlite:./email_sender.db
    healthCheckPath: /api/health

  # Frontend Static Site  
  - type: static
    name: email-sender-frontend
    env: node
    plan: free
    region: oregon  # or your preferred region
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://email-sender-backend.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
