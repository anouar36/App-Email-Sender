<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>
<body>
    <h1>Reset Password for anouarechcharai@gmail.com</h1>
    <button onclick="resetPassword()">Reset Password to "anouar123"</button>
    <div id="result"></div>

    <script>
        async function resetPassword() {
            try {
                const response = await fetch('http://localhost:5000/api/auth/reset-password-debug', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'anouarechcharai@gmail.com',
                        newPassword: 'anouar123'
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('result').innerHTML = `
                        <h2 style="color: green;">✅ Password Reset Successful!</h2>
                        <p><strong>Email:</strong> ${data.credentials.email}</p>
                        <p><strong>New Password:</strong> ${data.credentials.password}</p>
                        <p>You can now login with these credentials!</p>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `
                        <h2 style="color: red;">❌ Reset Failed</h2>
                        <p>${data.message}</p>
                    `;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h2 style="color: red;">❌ Error</h2>
                    <p>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
